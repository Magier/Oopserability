# daemonset.yaml — Deploys the Ooopservability agent on every node.
#
# The DaemonSet pattern is common for observability agents (Datadog, Falco,
# Fluentd, Node Exporter).  Running on every node makes the attack surface
# cluster-wide — compromise one pod, compromise the whole node fleet.

apiVersion: v1
kind: Namespace
metadata:
  name: ooopservability
  labels:
    # Label for easy cleanup: kubectl delete ns ooopservability
    app.kubernetes.io/name: ooopservability
    app.kubernetes.io/component: tutorial
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ooopservability-agent
  namespace: ooopservability
  labels:
    app.kubernetes.io/name: ooopservability
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ooopservability
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ooopservability
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: ooopservability-agent

      # hostPID / hostNetwork are NOT set here intentionally —
      # the nodes/proxy permission alone is the focus of the tutorial.
      # Uncommenting these would make the agent even more dangerous.
      # hostPID: true
      # hostNetwork: true

      containers:
        - name: agent
          image: ghcr.io/magier/ooopservability:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # Expose node name so the agent can build kubelet proxy URLs.
            # This is standard practice for DaemonSets.
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          # The SA token is automatically mounted at:
          #   /var/run/secrets/kubernetes.io/serviceaccount/token
          # Do NOT set automountServiceAccountToken: false — that is the point.
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true   # agent only reads logs ... supposedly
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10

      volumes:
        # Mount host /var/log so the log search endpoint has something to grep.
        - name: varlog
          hostPath:
            path: /var/log
            type: Directory

      tolerations:
        # Run on control-plane nodes too — interesting for tutorial purposes.
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule

---
# Optional: expose the agent on every node via a NodePort for easy access
# during the tutorial (not for production use).
apiVersion: v1
kind: Service
metadata:
  name: ooopservability-agent
  namespace: ooopservability
  labels:
    app.kubernetes.io/name: ooopservability
spec:
  selector:
    app.kubernetes.io/name: ooopservability
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
